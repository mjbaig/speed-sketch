<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Sketch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎨 Speed Sketch</h1>
    <div class="timer-display" id="timerDisplay">--:--</div>
  </header>

  <div class="image-area" id="imageArea">
    <div class="placeholder" id="placeholder">Loading images from /public...</div>
    <img id="sketchImage" style="display:none;" alt="reference">
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="controls">
    <button class="btn" id="prevBtn">⏮ Back</button>
    <button class="btn primary" id="playPauseBtn">▶ Start</button>
    <button class="btn" id="skipBtn">Skip ⏭</button>
    <div class="divider"></div>
    <div class="timer-select">
      <label for="timerSelect">Timer:</label>
      <select id="timerSelect">
        <option value="30">30 sec</option>
        <option value="60" selected>1 min</option>
        <option value="300">5 min</option>
        <option value="600">10 min</option>
        <option value="1200">20 min</option>
      </select>
    </div>
    <div class="divider"></div>
    <button class="btn" id="reshuffleBtn">🔀 Reshuffle</button>
  </div>

  <div class="status" id="status"></div>

  <script src="app.js"></script>
</body>
</html>
